<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudos TCE-PE — Controle de Preparação</title>
<style>
:root{
  --bg:#0f1419; --panel:#1a212b; --panel2:#222c38; --line:#2e3a48;
  --txt:#e6edf3; --muted:#8b9bb0; --accent:#4cc2ff; --accent2:#7c5cff;
  --ok:#3fb950; --warn:#d29922; --bad:#f85149; --revisar:#d29922;
  --radius:14px; --shadow:0 6px 20px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:"Segoe UI",system-ui,Roboto,Arial,sans-serif;font-size:15px;line-height:1.45}
a{color:var(--accent)}
.app{max-width:1180px;margin:0 auto;padding:0 18px 60px}
header.top{display:flex;align-items:center;gap:14px;padding:18px 0 10px;flex-wrap:wrap}
header.top h1{font-size:20px;margin:0;font-weight:700}
header.top .sub{color:var(--muted);font-size:13px}
header.top .spacer{flex:1}
.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#06121c;border-color:var(--accent);font-weight:600}
.btn.primary:hover{filter:brightness(1.08);color:#06121c}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 10px;font-size:13px}
.btn:disabled{opacity:.35;cursor:not-allowed;border-color:var(--line);color:var(--muted)}
.btn.danger:hover{border-color:var(--bad);color:var(--bad)}
nav.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 22px;border-bottom:1px solid var(--line);padding-bottom:0}
nav.tabs button{background:none;border:none;color:var(--muted);padding:11px 16px;cursor:pointer;font-size:15px;border-bottom:2px solid transparent;margin-bottom:-1px}
nav.tabs button.active{color:var(--txt);border-bottom-color:var(--accent);font-weight:600}
nav.tabs button:hover{color:var(--txt)}
.grid{display:grid;gap:16px}
.cards{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.kpi .label{color:var(--muted);font-size:13px;margin-bottom:6px}
.kpi .val{font-size:28px;font-weight:700;letter-spacing:-.5px}
.kpi .val small{font-size:14px;color:var(--muted);font-weight:500}
.kpi .foot{color:var(--muted);font-size:12px;margin-top:4px}
h2.sec{font-size:16px;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
h2.sec .pill{font-size:12px;color:var(--muted);font-weight:400}
.bar-row{display:flex;align-items:center;gap:10px;margin:9px 0}
.bar-row .name{width:215px;font-size:13.5px;flex-shrink:0}
.bar-row .track{flex:1;background:var(--panel2);height:16px;border-radius:8px;overflow:hidden;position:relative}
.bar-row .fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent2));min-width:2px}
.bar-row .meta{position:absolute;top:0;bottom:0;width:2px;background:#fff6;}
.bar-row .num{width:120px;text-align:right;font-size:12.5px;color:var(--muted);flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:500;font-size:12.5px;text-transform:uppercase;letter-spacing:.4px}
tr:hover td{background:#ffffff06}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.st-nao{background:#2e3a48;color:#a9b6c5}
.st-estudando{background:#19324a;color:#4cc2ff}
.st-revisar{background:#3a2f12;color:#e3b341}
.st-concluido{background:#16331f;color:#56d364}
.prio{display:inline-block;padding:1px 8px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px}
.prio.p1{background:#3a1518;color:#ff8a92}
.prio.p2{background:#3a2f12;color:#e3b341}
.prio.p3{background:#19324a;color:#7fd0ff}
.prio.p4{background:#2e3a48;color:#a9b6c5}
.badge2025{display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:700;background:#16331f;color:#56d364;margin-left:5px}
select,input[type=text],input[type=number],textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;width:100%}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent)}
label.fld{display:block;margin-bottom:14px}
label.fld .lab{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.ass-head,.ass-row{display:grid;grid-template-columns:minmax(130px,1.1fr) minmax(170px,1.9fr) 76px 76px 34px;gap:8px;align-items:center;margin-bottom:8px}
.ass-head{margin-bottom:4px;font-size:12px;color:var(--muted)}
.ass-row .btn{padding:6px 0;text-align:center}
.timer-box{text-align:center;padding:8px 0 4px}
.timer{font-size:64px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px}
.timer.running{color:var(--accent)}
.timer-ctrls{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.muted{color:var(--muted)}
.sched-day{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.sched-day h3{margin:0 0 4px;font-size:15px;display:flex;justify-content:space-between;align-items:center}
.sched-day h3 .tot{color:var(--muted);font-size:13px;font-weight:400}
.sched-item{display:flex;gap:12px;padding:7px 0;border-top:1px solid var(--line);font-size:14px}
.sched-item:first-of-type{border-top:none}
.sched-item .min{color:var(--accent);font-weight:600;width:58px;flex-shrink:0}
.sched-item .mt{font-weight:600;width:240px;flex-shrink:0}
.sched-item .ds{color:var(--muted);flex:1;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.sched-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.sched-day.today h3::after{content:"hoje";background:var(--accent);color:#06121c;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:8px}
.topchip{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:3px 8px;font-size:13px;color:var(--text)}
.topchip.c25{border-color:var(--ok)}
.topchip .qn{color:var(--muted);font-size:11.5px}
.cods{display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn.xs{padding:2px 7px;font-size:11.5px;border-radius:6px;line-height:1.4}
.cods-ver{color:var(--accent);cursor:pointer;font-size:11.5px;text-decoration:underline;user-select:none}
.cods-list{flex-basis:100%;margin-top:4px;font-family:ui-monospace,Consolas,monospace;font-size:11.5px;color:var(--muted);word-break:break-all;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:5px 7px;user-select:all}
.bloco-note{font-style:italic}
.crono-nav{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.crono-nav .wk{font-size:18px;font-weight:700}
.crono-nav .now-pill{background:var(--ok);color:#06121c;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
.crono-nav .ph{color:var(--muted);font-size:13px}
th.wk-now,td.wk-now{background:rgba(76,194,255,.12)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin:6px 0 16px}
.legend span{display:flex;align-items:center;gap:6px}
.phase{border-left:3px solid var(--accent);padding:4px 0 4px 14px;margin:14px 0}
.phase h4{margin:0 0 4px;font-size:14.5px}
.phase p{margin:0;color:var(--muted);font-size:13.5px}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.filters select,.filters input{width:auto;min-width:140px}
.mat-group{margin-bottom:8px}
.mat-head{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;cursor:pointer;user-select:none}
.mat-head .mname{font-weight:600;flex:1}
.mat-head .mprog{font-size:12.5px;color:var(--muted)}
.mat-head .mbar{width:90px;height:7px;background:var(--bg);border-radius:5px;overflow:hidden}
.mat-head .mbar i{display:block;height:100%;background:var(--ok)}
.mat-body{padding:4px 0 10px}
.empty{color:var(--muted);text-align:center;padding:30px;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ok);color:#06121c;padding:11px 22px;border-radius:10px;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
.hide{display:none!important}
.flex{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.qstat{font-size:12.5px;color:var(--muted)}
.right{text-align:right}
/* Gantt */
.gantt-wrap{overflow-x:auto}
.gantt{--glab:270px;position:relative;min-width:820px}
.g-row{display:flex;align-items:center;min-height:25px}
.g-row.ghead{margin-top:12px;background:var(--panel2);border-radius:8px;padding:5px 0}
.g-lab{width:var(--glab);flex-shrink:0;font-size:12.5px;padding:0 10px 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-lab .q{color:var(--muted);font-size:11.5px}
.g-track{flex:1;position:relative;height:24px}
.g-bar{position:absolute;border-radius:4px;box-sizing:border-box}
.g-plan{top:4px;height:16px;border:1.5px dashed #8b9bb088}
.g-eff{top:4px;height:16px;opacity:.4}
.g-real{top:13px;height:3px;border-radius:2px;opacity:.85}
.g-dot{position:absolute;top:8px;height:8px;border-radius:2px;min-width:3px}
.g-sep{position:absolute;width:1px;background:var(--line);z-index:0}
.g-today{position:absolute;width:2px;background:var(--bad);z-index:3;opacity:.85}
.g-wlab{position:absolute;top:2px;font-size:11px;color:var(--muted)}
.mov-chip{color:var(--warn);font-size:11px;font-weight:700}
@media(max-width:680px){
  .gantt{--glab:150px}
  .bar-row .name{width:130px}.bar-row .num{width:90px}
  .sched-item .mt{width:auto}.timer{font-size:48px}
  .row2,.row3{grid-template-columns:1fr}
  .ass-head{display:none}
  .ass-row{grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line);padding-bottom:8px}
}
</style>
</head>
<body>
<div class="app">

      <h1>📊 Estudos TCE-PE — Auditor de Controle Externo</h1>

    <button class="btn sm" onclick="exportData()">⭳ Backup</button>
    <button class="btn sm" onclick="document.getElementById('importFile').click()">⭱ Restaurar</button>

  <nav class="tabs" id="tabs">

</div>
<div class="toast" id="toast"></div>

  const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";

  try{ document.execCommand("copy"); ok(); }catch(e){ toast("Copie manualmente na lista"); }
  document.body.removeChild(ta);
}

}

function fmtMin(min){
  min = Math.round(min);
  const h = Math.floor(min/60), m = min%60;
  if(h>0) return h+"h"+(m>0?String(m).padStart(2,"0"):"00");
  return m+"min";
}
function fmtClock(sec){
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  return [h,m,s].map(x=>String(x).padStart(2,"0")).join(":");
}
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function startOfWeek(d){ // segunda
  const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x;
}
function inThisWeek(dateStr){
  const sow=startOfWeek(new Date()); const eow=new Date(sow); eow.setDate(eow.getDate()+7);
  const d=new Date(dateStr+"T12:00:00"); return d>=sow && d<eow;
}
function pct(a,b){ return b>0 ? Math.round(a/b*100) : 0; }
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }

// agregações
function sessionsFiltered(weekOnly){ return state.sessions.filter(s=> !weekOnly || inThisWeek(s.data)); }
function sumBy(sessions){
  let min=0,qr=0,qa=0; sessions.forEach(s=>{min+=s.minutos||0;qr+=s.qResolvidas||0;qa+=s.qAcertadas||0;});
  return {min,qr,qa};
}
function minutosPorGrupo(weekOnly){
  const m={}; sessionsFiltered(weekOnly).forEach(s=>{ const g=grupo(s.mat); m[g]=(m[g]||0)+(s.minutos||0); }); return m;
}
function questoesPorGrupo(weekOnly){
  const m={}; sessionsFiltered(weekOnly).forEach(s=>{ const g=grupo(s.mat); if(!m[g])m[g]={qr:0,qa:0}; m[g].qr+=s.qResolvidas||0; m[g].qa+=s.qAcertadas||0; }); return m;
}

}

function streak(){
  const dias=new Set(state.sessions.filter(s=>s.minutos>0).map(s=>s.data));
  let n=0; let d=new Date();
  // se hoje não estudou, começa de ontem
  if(!dias.has(todayStr())) d.setDate(d.getDate()-1);
  for(;;){ const ds=d.toISOString().slice(0,10); if(dias.has(ds)){n++; d.setDate(d.getDate()-1);} else break; }

function revGrupoTec(mat){ // matéria do TEC -> grupo do plano (só p/ cor)
  const m=(mat||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  if(m.includes("auditoria")) return "AUD";

}

    if(cad.status!=="ativa") return;
    for(const [et] of REV_ETAPAS){
      const e=cad.etapas[et];
      if(!e) continue;
      if(e.emitida) continue; // já emitida em folha (ou expirada)
      const atraso=Math.round((dh-new Date(e.prevista+"T12:00:00"))/86400000);
      if(et==="d1"&&atraso>3) continue; // consolidação tardia expira; o D+6 cobre
      const limite=(et==="d28")?sabado:hoje; // D+28 antecipa p/ o simulado da semana
      push(chave,cad,et,e,e.prevista<=limite,Math.max(0,atraso));
      break; // 1 etapa por cadeia; as seguintes esperam
    }
  });
  out.sort((a,b)=> (b.due?1:0)-(a.due?1:0) || b.atraso-a.atraso || a.prev.localeCompare(b.prev) || a.assunto.localeCompare(b.assunto));
  return out;
}
function revMarcarReal(chaveEnc,et,pular){
  state.revFeitas["real|"+decodeURIComponent(chaveEnc)+"|"+et]=pular?"pulada":todayStr(); save();
  const ab=document.querySelector("#tabs button.active"); render(ab?ab.dataset.tab:"dash");
  toast(pular?"Revisão pulada":"Revisão concluída ✓");
}
function revLinhaReal(p,comBotoes){
  const cor=REV_COR[p.et];
  const atr=p.atraso>0?` <span style="color:var(--bad);font-weight:600">⚠ ${p.atraso}d atrasada</span>`:"";
  const alv=p.alvos?` <span class="muted">· ${p.alvos} alvo${p.alvos>1?"s":""}</span>`:"";
  const k=encodeURIComponent(p.chave);
  const acao=comBotoes
    ?`<span style="white-space:nowrap"><button class="btn sm" onclick="revMarcarReal('${k}','${p.et}',false)">✓ feita</button> <button class="btn sm" onclick="revMarcarReal('${k}','${p.et}',true)">pular</button></span>`
    :`<span class="muted" style="white-space:nowrap">${fmtData(p.prev)}</span>`;
  return `<div class="sched-item"><span class="min" style="color:${cor};font-weight:600">${p.rot}</span>
    <span class="mt"><span class="dot" style="background:${matCor(revGrupoTec(p.materia))}"></span> ${escapeHtml(p.assunto==="(sem assunto)"?p.materia+" — geral":p.assunto)}${atr}${alv}</span>
    <span class="ds">${p.dica}</span>${acao}</div>`;
}

function revBases(){ // topicId -> data da 1ª sessão registrada
  const m={};
  state.sessions.forEach(s=>{ if(!s.topicId) return; const k=String(s.topicId);
    if(!m[k]||s.data<m[k]) m[k]=s.data; });
  return m;
}
function revData(base,dias){ // prevista: +dias, domingo antecipa p/ sábado, corte 16/08
  const d=new Date(base+"T12:00:00"); d.setDate(d.getDate()+dias);
  if(d.getDay()===0) d.setDate(d.getDate()-1);
  const s=d.toISOString().slice(0,10);
  return s>REV_CUTOFF?REV_CUTOFF:s;
}
function revLista(){ // etapas não feitas de todos os assuntos já iniciados
  const bases=revBases(), out=[]; let mudou=false;
  Object.entries(bases).forEach(([tid,base])=>{
    const t=topicById(tid); if(!t) return;
    const full=REV_FULL.includes(grupo(t.mat));
    REV_ETAPAS.forEach(([et,dias,rot,dica])=>{
      if(!full&&et!=="d14") return;
      const key=tid+"|"+et; if(state.revFeitas[key]) return;
      const prev=revData(base,dias);
      const atraso=Math.round((new Date(todayStr())-new Date(prev))/86400000);
      if(et==="d1"&&atraso>3){ state.revFeitas[key]="expirada"; mudou=true; return; } // consolidação tardia não vale o custo
      out.push({tid,et,rot,dica,prev,atraso,t});
    });
  });
  if(mudou) save();
  out.sort((a,b)=> b.atraso-a.atraso || a.prev.localeCompare(b.prev) || a.t.assunto.localeCompare(b.t.assunto));
  return out;
}
function revMarcar(tid,et,pular){
  state.revFeitas[tid+"|"+et]=pular?"pulada":todayStr(); save();
  const ab=document.querySelector("#tabs button.active"); render(ab?ab.dataset.tab:"dash");
  toast(pular?"Revisão pulada":"Revisão concluída ✓");
}
function revLinha(p,comBotoes){
  const cor=REV_COR[p.et];
  const atr=p.atraso>0?` <span style="color:var(--bad);font-weight:600">⚠ ${p.atraso}d atrasada</span>`:"";
  const acao=comBotoes
    ?`<span style="white-space:nowrap"><button class="btn sm" onclick="revMarcar('${p.tid}','${p.et}',false)">✓ feita</button> <button class="btn sm" onclick="revMarcar('${p.tid}','${p.et}',true)">pular</button></span>`
    :`<span class="muted" style="white-space:nowrap">${fmtData(p.prev)}</span>`;
  return `<div class="sched-item"><span class="min" style="color:${cor};font-weight:600">${p.rot}</span>
    <span class="mt"><span class="dot" style="background:${matCor(p.t.mat)}"></span> ${escapeHtml(p.t.assunto)}${atr}</span>
    <span class="ds">${p.dica}</span>${acao}</div>`;
}
function revPillFonte(){
  return REV_ESTADO
    ?`fila real · tec-revisao (estado de ${fmtData((REV_ESTADO.ultima_fila&&REV_ESTADO.ultima_fila.data)||todayStr())})`
    :`estimada pelas sessões — fila real indisponível`;
}
function revSecaoDash(){
  let h=`<h2 class="sec">🔁 Revisões de hoje <span class="pill">${revPillFonte()}</span></h2><div class="card">`;
  if(REV_ESTADO){
    const due=revListaReal().filter(p=>p.due);
    if(due.length===0) h+=`<div class="empty">Nenhuma etapa vencida na fila real (cadeias do TEC). O conteúdo de cada etapa está na folha do dia em <code>07_TEC/Revisao/</code>.</div>`;
    else{
      due.forEach(p=>h+=revLinhaReal(p,true));
      h+=`<div class="muted" style="margin-top:8px;font-size:.85em">Conteúdo (questões, conceitos-chave, recall) na folha do dia · ✓ aqui é só checklist — o estado real avança via <code>gerar_fila.py --confirmar</code>.</div>`;
    }
    return h+`</div>`;
  }
  const hoje=todayStr(); const due=revLista().filter(p=>p.prev<=hoje);
  if(due.length===0) h+=`<div class="empty">Nenhuma revisão vencida. Cada assunto ganha revisões automáticas em D+1, D+6, D+14 e D+28 a partir da primeira sessão registrada.</div>`;
  else due.forEach(p=>h+=revLinha(p,true));
  return h+`</div>`;
}
function revSecaoCrono(){
  const hoje=todayStr();
  const d=new Date(hoje+"T12:00:00"); d.setDate(d.getDate()+7); const lim=d.toISOString().slice(0,10);
  let due,prox,linha;
  if(REV_ESTADO){
    const l=revListaReal();
    due=l.filter(p=>p.due); prox=l.filter(p=>!p.due&&p.prev<=lim); linha=revLinhaReal;
  }else{
    const l=revLista();
    due=l.filter(p=>p.prev<=hoje); prox=l.filter(p=>p.prev>hoje&&p.prev<=lim); linha=revLinha;
  }
  let h=`<h2 class="sec">🔁 Fila de revisões <span class="pill">D+1 consolidação · D+6 resgate · D+14 integração · D+28 simulado · ${revPillFonte()}</span></h2><div class="card">`;
  if(due.length===0&&prox.length===0) return h+`<div class="empty">Nada agendado para os próximos 7 dias.</div></div>`;
  if(due.length){ h+=`<div style="margin-bottom:6px"><b>Hoje${due.some(p=>p.atraso>0)?" + atrasadas":""}</b></div>`; due.forEach(p=>h+=linha(p,true)); }
  if(prox.length){ h+=`<div style="margin:10px 0 6px"><b>Próximos 7 dias</b></div>`; prox.forEach(p=>h+=linha(p,false)); }
  return h+`</div>`;
}

function barRow(name, percent, numTxt, cor, showMeta){
  return `<div class="bar-row"><div class="name">${escapeHtml(name)}</div>
    <div class="track"><div class="fill" style="width:${Math.max(0,Math.min(100,percent))}%;background:${cor||'var(--accent)'}"></div>${showMeta?'<div class="meta" style="left:100%"></div>':''}</div>
    <div class="num">${numTxt}</div></div>`;
}
function recentTable(n){
  const ss=[...state.sessions].sort((a,b)=> (b.data+String(b.id)).localeCompare(a.data+String(a.id))).slice(0,n||999);
  if(ss.length===0) return `<div class="empty">Sem sessões registradas ainda.</div>`;
  let h=`<table><thead><tr><th>Data</th><th>Matéria</th><th>Assunto</th><th>Tempo</th><th class="right">Questões</th><th class="right">Acerto</th></tr></thead><tbody>`;
  ss.forEach(s=>{
    const t=s.topicId?topicById(s.topicId):null;
    const ass=t?t.assunto:(s.assuntoLivre||"—");
    const ac=s.qResolvidas>0?pct(s.qAcertadas,s.qResolvidas)+"%":"—";
    h+=`<tr><td>${fmtData(s.data)}</td><td><span class="dot" style="background:${matCor(s.mat)}"></span> ${matNome(s.mat)}</td><td>${escapeHtml(ass)}</td><td>${fmtMin(s.minutos)}</td><td class="right">${s.qResolvidas||0}</td><td class="right">${ac}</td></tr>`;
  });
  return h+`</tbody></table>`;
}
function fmtData(s){ const [y,m,d]=s.split("-"); return `${d}/${m}`; }

function timerSec(){ return Math.floor((timer.accMs + (timer.running ? Date.now()-timer.startTs : 0))/1000); }

let assRowSeq=0;
function matOptions(sel){ return Object.keys(MAT_INFO).map(g=>`<option value="${g}" ${g===sel?"selected":""}>${MAT_INFO[g].nome}</option>`).join(""); }
function assuntoOptions(g){
  const ts=allTopics().filter(t=>grupo(t.mat)===g).sort(prioSort);
  let opts=ts.map(t=>{const m=topicMeta(t.id),s=topicSemana(t.id);const tag=m>0?`(S${s}·${m}q) `:"";return `<option value="${t.id}">${t.c25?"✅ ":""}[${PRIO_LABEL[t.prio||3]}] ${tag}${escapeHtml(t.assunto)}</option>`;}).join("");
  opts+=`<option value="__livre">✎ Outro / digitar livre...</option>`;
  return opts;
}
function addAssRow(){
  const rid=++assRowSeq, defMat=Object.keys(MAT_INFO)[0];
  const div=document.createElement("div");
  div.className="ass-row"; div.dataset.rid=rid;
  div.innerHTML=`<select class="r-mat" onchange="fillRowAssuntos(${rid})">${matOptions(defMat)}</select>
    <select class="r-ass">${assuntoOptions(defMat)}</select>
    <input type="number" class="r-qr" min="0" placeholder="0" title="questões resolvidas">
    <input type="number" class="r-qa" min="0" placeholder="0" title="questões acertadas">
    <button class="btn sm danger" onclick="delAssRow(${rid})" title="remover assunto">×</button>`;
  document.getElementById("assRows").appendChild(div);
}
function rowEl(rid){ return document.querySelector(`.ass-row[data-rid="${rid}"]`); }
function fillRowAssuntos(rid){ const r=rowEl(rid); r.querySelector(".r-ass").innerHTML=assuntoOptions(r.querySelector(".r-mat").value); }
function delAssRow(rid){
  if(document.querySelectorAll("#assRows .ass-row").length<=1){ toast("A sessão precisa de ao menos 1 assunto"); return; }
  rowEl(rid).remove();
}
function timerToggle(){
  const b=document.getElementById("btnStart"), disp=document.getElementById("timerDisp");
  if(!timer.running){
    timer.running=true; timer.startTs=Date.now();
    b.textContent="⏸ Pausar"; disp.classList.add("running");
    // Recalcula a partir do relógio real a cada tick: imune ao throttle de abas em 2º plano e à suspensão do PC
    timer.intv=setInterval(updateTimerDisp,1000);
  } else {
    timer.accMs += Date.now()-timer.startTs; timer.startTs=null; timer.running=false;
    b.textContent="▶ Continuar"; disp.classList.remove("running"); clearInterval(timer.intv);
  }
}
function timerReset(){ timer.running=false; timer.accMs=0; timer.startTs=null; clearInterval(timer.intv); const b=document.getElementById("btnStart"); if(b)b.textContent="▶ Iniciar"; const d=document.getElementById("timerDisp"); if(d)d.classList.remove("running"); updateTimerDisp(); }
function updateTimerDisp(){ const d=document.getElementById("timerDisp"); if(d) d.textContent=fmtClock(timerSec()); }
function salvarSessao(){
  const msg=document.getElementById("sessMsg");
  const err=t=>{ msg.textContent=t; msg.style.color="var(--bad)"; };
  const rows=[...document.querySelectorAll("#assRows .ass-row")];
  if(rows.length===0){ err("⚠️ Adicione pelo menos um assunto."); return; }
  const itens=[];
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    const qr=parseInt(r.querySelector(".r-qr").value)||0, qa=parseInt(r.querySelector(".r-qa").value)||0;
    if(qa>qr){ err(`⚠️ Assunto ${i+1}: acertos não podem exceder resolvidas.`); return; }
    itens.push({mat:r.querySelector(".r-mat").value, assSel:r.querySelector(".r-ass").value, qr, qa});
  }
  const ids=itens.filter(x=>x.assSel!=="__livre").map(x=>x.assSel);
  if(new Set(ids).size!==ids.length){ err("⚠️ Há assuntos repetidos na sessão."); return; }
  let minutos=parseInt(document.getElementById("fMin").value);
  if(isNaN(minutos)||minutos<=0){ const ts=timerSec(); if(ts>0) minutos=Math.max(1,Math.round(ts/60)); }
  if(isNaN(minutos)||minutos<0) minutos=0;
  const qrTot=itens.reduce((a,x)=>a+x.qr,0);
  if(minutos===0 && qrTot===0){ err("⚠️ Informe tempo ou questões."); return; }
  for(let i=0;i<itens.length;i++){
    const x=itens[i];
    if(x.assSel==="__livre"){ x.assuntoLivre=(prompt(`Digite o assunto estudado (linha ${i+1}):`)||"").trim(); if(!x.assuntoLivre) return; x.topicId=null; }
    else { x.topicId=x.assSel; x.assuntoLivre=""; }
  }
  // um registro por assunto: tempo dividido igualmente (sobra vai para as primeiras linhas)
  const n=itens.length, base=Math.floor(minutos/n); let resto=minutos-base*n;
  const data=document.getElementById("fData").value||todayStr();
  const obs=document.getElementById("fObs").value.trim();
  const st=document.getElementById("fStatus").value;
  itens.forEach((x,i)=>{
    const m=base+(resto>0?1:0); if(resto>0)resto--;
    state.sessions.push({ id:state.nextSid++, data, mat:x.mat, topicId:x.topicId, assuntoLivre:x.assuntoLivre,
      minutos:m, qResolvidas:x.qr, qAcertadas:x.qa, obs:i===0?obs:"" });
    if(st && x.topicId) state.topicStatus[x.topicId]=st;
  });
  save();
  // limpar
  document.getElementById("fMin").value=""; document.getElementById("fObs").value=""; document.getElementById("fStatus").value="";
  document.getElementById("assRows").innerHTML=""; addAssRow();
  timerReset();
  msg.textContent = n>1 ? `✓ Sessão salva (${n} assuntos)!` : "✓ Sessão salva!"; msg.style.color="var(--ok)";
  toast("Sessão registrada"); renderHoje();
}
function renderHoje(){
  const box=document.getElementById("hojeBox"); if(!box) return;
  const t=todayStr(); const ss=state.sessions.filter(s=>s.data===t);
  if(ss.length===0){ box.innerHTML=`<div class="empty">Nenhuma sessão hoje. Bons estudos! 💪</div>`; return; }
  const tot=sumBy(ss);

  ss.forEach(s=>{ const tp=s.topicId?topicById(s.topicId):null; const ass=tp?tp.assunto:(s.assuntoLivre||"—");
    const q = s.qResolvidas>0 ? `${s.qAcertadas||0}/${s.qResolvidas}q (${pct(s.qAcertadas,s.qResolvidas)}%)` : "—";
    h+=`<tr><td><span class="dot" style="background:${matCor(s.mat)}"></span> ${matNome(s.mat)}</td><td>${escapeHtml(ass)}</td><td>${fmtMin(s.minutos)}</td><td>${q}</td><td><button class="btn sm danger" onclick="delSession(${s.id})">excluir</button></td></tr>`; });

/* ============================================================
   DISCIPLINA — evolução no tempo (questões resolvidas e taxa de acerto),
   total, por matéria e por assunto. Fonte: state.sessions.
   ============================================================ */
let discFilt={mat:"",ass:"",gran:"dia"};
function sessKeyAssunto(s){ return s.topicId?("t"+s.topicId):("l"+(s.assuntoLivre||"—")); }
function sessNomeAssunto(s){ const t=s.topicId?topicById(s.topicId):null; return t?t.assunto:(s.assuntoLivre||"—"); }
function keyEnc(k){ return encodeURIComponent(k).replace(/'/g,"%27"); }
function discSetMat(v){ discFilt.mat=v; discFilt.ass=""; renderDisciplina(); }
function discSetAss(v){ const k=decodeURIComponent(v); discFilt.ass=(k&&discFilt.ass===k)?"":k; renderDisciplina(); }
function discSetGran(v){ discFilt.gran=v; renderDisciplina(); }

function serieTemporal(sess){ // agrega por dia ou semana -> [{per,qr,qa}] em ordem cronológica
  const porSem=discFilt.gran==="sem", m={};
  sess.forEach(s=>{
    const per=porSem?startOfWeek(new Date(s.data+"T12:00:00")).toISOString().slice(0,10):s.data;
    if(!m[per]) m[per]={qr:0,qa:0};
    m[per].qr+=s.qResolvidas||0; m[per].qa+=s.qAcertadas||0;
  });
  return Object.keys(m).sort().map(per=>({per,qr:m[per].qr,qa:m[per].qa}));
}
function tendencia(sess){ // 1ª metade vs 2ª metade das questões, em ordem cronológica
  const recs=[...sess].sort((a,b)=>a.data.localeCompare(b.data)||a.id-b.id);
  const tot=recs.reduce((a,s)=>a+(s.qResolvidas||0),0);
  if(tot<8) return null; // amostra pequena demais para tendência
  let acc=0; const h1={qr:0,qa:0}, h2={qr:0,qa:0};
  recs.forEach(s=>{ const h=acc<tot/2?h1:h2; h.qr+=s.qResolvidas||0; h.qa+=s.qAcertadas||0; acc+=s.qResolvidas||0; });
  if(!h1.qr||!h2.qr) return null;
  const p1=pct(h1.qa,h1.qr), p2=pct(h2.qa,h2.qr);
  return {d:p2-p1,p1,p2};
}
function tendTag(t){
  if(!t) return '<span class="muted" style="font-size:12px">amostra pequena</span>';
  const cor=t.d>=3?"var(--ok)":t.d<=-3?"var(--bad)":"var(--muted)";
  const sym=t.d>=3?"▲":t.d<=-3?"▼":"▬";
  return `<span style="color:${cor};font-weight:600">${sym} ${t.d>0?"+":""}${t.d}pp</span> <span class="muted" style="font-size:11.5px">${t.p1}%→${t.p2}%</span>`;
}
function sparkline(serie){ // mini-gráfico da % de acerto por período
  if(serie.length<2) return '<span class="muted">—</span>';
  const W=110,H=26,p=4;
  const xy=serie.map((s,i)=>[p+(W-2*p)*i/(serie.length-1), p+(H-2*p)*(1-pct(s.qa,s.qr)/100)]);
  const last=pct(serie[serie.length-1].qa,serie[serie.length-1].qr);
  const cor=last>=70?"var(--ok)":last>=50?"var(--warn)":"var(--bad)";
  return `<svg width="${W}" height="${H}" style="vertical-align:middle"><polyline points="${xy.map(c=>c.map(v=>v.toFixed(1)).join(",")).join(" ")}" fill="none" stroke="${cor}" stroke-width="1.5"/><circle cx="${xy[xy.length-1][0].toFixed(1)}" cy="${xy[xy.length-1][1].toFixed(1)}" r="2.5" fill="${cor}"/></svg>`;
}
function chartEvolucao(serie){
  if(!serie.length) return `<div class="empty">Nenhuma questão registrada com esses filtros. Registre na aba <b>Sessão de Estudo</b>.</div>`;
  const n=serie.length,W=Math.max(620,n*56+96),H=252,pL=42,pR=46,pT=20,pB=34;
  const iw=W-pL-pR,ih=H-pT-pB;
  const maxQ=Math.max(...serie.map(p=>p.qr),1);
  const x=i=>pL+iw*((i+0.5)/n), yQ=v=>pT+ih-(v/maxQ)*ih, yP=v=>pT+ih-(v/100)*ih;
  const bw=Math.min(30,(iw/n)*0.5);
  let aq=0,aa=0; const cum=serie.map(p=>{aq+=p.qr;aa+=p.qa;return pct(aa,aq);});
  let g=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:${Math.min(W,860)}px;display:block">`;
  [0,25,50,75,100].forEach(v=>{ g+=`<line x1="${pL}" x2="${W-pR}" y1="${yP(v)}" y2="${yP(v)}" stroke="var(--line)" stroke-width="1"${v?' stroke-dasharray="3 4"':''}/><text x="${W-pR+6}" y="${yP(v)+3.5}" fill="var(--muted)" font-size="10">${v}%</text>`; });
  g+=`<text x="${pL-6}" y="${yQ(maxQ)+4}" fill="var(--muted)" font-size="10" text-anchor="end">${maxQ}q</text><text x="${pL-6}" y="${pT+ih+4}" fill="var(--muted)" font-size="10" text-anchor="end">0</text>`;
  serie.forEach((p,i)=>{
    g+=`<rect x="${(x(i)-bw/2).toFixed(1)}" y="${yQ(p.qr).toFixed(1)}" width="${bw.toFixed(1)}" height="${(pT+ih-yQ(p.qr)).toFixed(1)}" rx="3" fill="#4cc2ff44"/>`;
    g+=`<text x="${x(i).toFixed(1)}" y="${(yQ(p.qr)-4).toFixed(1)}" fill="var(--muted)" font-size="10" text-anchor="middle">${p.qr}</text>`;
    if(n<=24||i%Math.ceil(n/24)===0) g+=`<text x="${x(i).toFixed(1)}" y="${H-8}" fill="var(--muted)" font-size="10" text-anchor="middle">${fmtData(p.per)}</text>`;
  });
  g+=`<polyline points="${serie.map((p,i)=>x(i).toFixed(1)+","+yP(cum[i]).toFixed(1)).join(" ")}" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-dasharray="5 4" opacity=".9"/>`;
  g+=`<polyline points="${serie.map((p,i)=>x(i).toFixed(1)+","+yP(pct(p.qa,p.qr)).toFixed(1)).join(" ")}" fill="none" stroke="var(--ok)" stroke-width="2"/>`;
  serie.forEach((p,i)=>{ const v=pct(p.qa,p.qr);
    g+=`<circle cx="${x(i).toFixed(1)}" cy="${yP(v).toFixed(1)}" r="3.5" fill="var(--ok)"/><text x="${x(i).toFixed(1)}" y="${(yP(v)-7).toFixed(1)}" fill="var(--ok)" font-size="10" font-weight="600" text-anchor="middle">${v}%</text>`; });
  g+=`</svg>`;
  return `<div style="overflow-x:auto">${g}</div>
  <div class="legend" style="margin:8px 0 0">
    <span><span class="dot" style="background:#4cc2ff77;border-radius:3px;width:12px"></span>questões resolvidas</span>
    <span><span class="dot" style="background:var(--ok)"></span>% acerto do período</span>
    <span><span style="border-top:2px dashed var(--accent2);width:16px;display:inline-block"></span>% acerto acumulado</span>
  </div>`;
}

/* ============================================================
   REPLANEJAMENTO DINÂMICO — o cronograma segue a execução real.
   planExec(): consolida as sessões por assunto (questões, datas, dias).
   replanejar(): assuntos com meta cumprida ficam na semana em que foram
   concluídos; o que falta é realocado da semana atual em diante (nunca
   antes da semana original), empurrando para a frente quando a capacidade
   semanal da matéria (maior carga semanal do próprio plano) estoura.
   ============================================================ */
function planExec(){
  const m={};
  [...state.sessions].sort((a,b)=>a.data.localeCompare(b.data)||(a.id||0)-(b.id||0)).forEach(s=>{
    if(!s.topicId) return; const k=String(s.topicId);
    if(!m[k]) m[k]={qr:0,qa:0,min:0,d0:null,d1:null,dMeta:null,dias:[]};
    const e=m[k];
    e.qr+=s.qResolvidas||0; e.qa+=s.qAcertadas||0; e.min+=s.minutos||0;
    if((s.minutos||0)>0||(s.qResolvidas||0)>0){
      if(!e.d0) e.d0=s.data; if(!e.d1||s.data>e.d1) e.d1=s.data;
      if(!e.dias.includes(s.data)) e.dias.push(s.data);
    }
    const meta=topicMeta(s.topicId);
    if(!e.dMeta&&meta>0&&e.qr>=meta) e.dMeta=s.data;
  });
  return m;
}
function replanejar(){
  const exec=planExec();
  const cwReal=semanaDoDia(new Date());
  const wNow=Math.min(8,Math.max(1,cwReal));
  const topics=SEED_TOPICS.filter(t=>topicMeta(t.id)>0&&topicSemana(t.id)>0);
  // capacidade semanal por matéria = maior carga semanal do plano original
  const load={};
  topics.forEach(t=>{ const g=grupo(t.mat), w=topicSemana(t.id);
    (load[g]=load[g]||{})[w]=(load[g][w]||0)+topicMeta(t.id); });
  const cap={}; Object.keys(load).forEach(g=>cap[g]=Math.max(...Object.values(load[g])));
  const info={}, uso={}, pend=[]; let overflow=0;
  topics.forEach(t=>{
    const e=exec[String(t.id)]||{qr:0,qa:0,min:0,dias:[]};
    const meta=topicMeta(t.id), semOrig=topicSemana(t.id);
    const resto=Math.max(0,meta-e.qr);
    const ok=resto===0||state.topicStatus[t.id]==="concluido";
    if(ok){
      const dRef=e.dMeta||e.d1;
      const semEff=dRef?Math.min(8,Math.max(1,semanaDoDia(new Date(dRef+"T12:00:00")))):semOrig;
      info[t.id]={t,semOrig,semEff,meta,qr:e.qr,qa:e.qa,resto:0,ok:true,movido:false,exec:e};
    } else pend.push({t,g:grupo(t.mat),semOrig,meta,resto,e});
  });
  pend.sort((a,b)=>a.semOrig-b.semOrig||prioSort(a.t,b.t));
  pend.forEach(p=>{
    let w=Math.max(wNow,Math.min(p.semOrig,8));
    while(w<8){
      const usado=(uso[p.g]&&uso[p.g][w])||0;
      if(usado===0||usado+p.resto<=cap[p.g]) break;
      w++;
    }
    (uso[p.g]=uso[p.g]||{})[w]=(((uso[p.g]||{})[w])||0)+p.resto;
    if(w>6) overflow+=p.resto;
    info[p.t.id]={t:p.t,semOrig:p.semOrig,semEff:w,meta:p.meta,qr:p.e.qr,qa:p.e.qa,resto:p.resto,ok:false,movido:w>p.semOrig,exec:p.e};
  });
  return {info,cap,wNow,cwReal,overflow};
}

/* ============================================================
   CRONOGRAMA
   ============================================================ */
let cronoModo="efetivo"; // "efetivo" = replanejado conforme execução · "original" = plano fixo
function cronoModoSet(m){ cronoModo=m; renderCronograma(); }

function tabelaQuestoesSemana(hl,plano){
  const efet=cronoModo==="efetivo";
  const infos=Object.values(plano.info);
  let maxW=6;
  if(efet) infos.forEach(i=>{ if(!i.ok&&i.semEff>maxW) maxW=i.semEff; });
  const weeks=[]; for(let w=1;w<=maxW;w++) weeks.push(w);
  const mats=Object.keys(MAT_INFO).filter(g=>infos.some(i=>grupo(i.t.mat)===g));
  const cell={}, pendCell={}, totMat={}, totSem={}, timeSem={};
  mats.forEach(g=>{ cell[g]={}; pendCell[g]={}; totMat[g]=0; });
  infos.forEach(i=>{
    const g=grupo(i.t.mat), w=efet?i.semEff:i.semOrig, v=efet?(i.ok?i.meta:i.resto):i.meta;
    cell[g][w]=(cell[g][w]||0)+v; totMat[g]+=v; totSem[w]=(totSem[w]||0)+v;
    if(!i.ok) pendCell[g][w]=true;
  });
  weeks.forEach(w=>{ let min=0; mats.forEach(g=>{ min+=(cell[g][w]||0)/ritmo(g)*60; }); timeSem[w]=min; });
  const wc=w=>w===hl?" wk-now":"";
  let h=`<table><thead><tr><th>Matéria</th>`+weeks.map(w=>`<th class="right${wc(w)}">S${w}</th>`).join("")+`<th class="right">Total</th></tr></thead><tbody>`;
  mats.forEach(g=>{
    h+=`<tr><td><span class="dot" style="background:${MAT_INFO[g].cor}"></span> ${MAT_INFO[g].nome} <span class="qstat">(${RITMO[g]}q/h)</span></td>`;
    weeks.forEach(w=>{ const v=cell[g][w]||0;
      let s=v?String(v):'<span class="muted">·</span>';
      if(efet&&v&&!pendCell[g][w]) s=`<span style="color:var(--ok);font-weight:600">${v}✓</span>`;
      h+=`<td class="right${wc(w)}">${s}</td>`; });
    h+=`<td class="right"><b>${totMat[g]}</b></td></tr>`;
  });
  const totGeral=Object.values(totMat).reduce((a,b)=>a+b,0);
  h+=`<tr><td><b>Total questões</b></td>`+weeks.map(w=>`<td class="right${wc(w)}"><b>${totSem[w]||0}</b></td>`).join("")+`<td class="right"><b>${totGeral}</b></td></tr>`;
  h+=`<tr><td class="muted">Tempo só de questões</td>`+weeks.map(w=>`<td class="right muted${wc(w)}">${fmtMin(timeSem[w]||0)}</td>`).join("")+`<td class="right muted">—</td></tr>`;
  h+=`</tbody></table><div class="muted" style="font-size:12.5px;margin-top:8px">${efet
    ?`Modo <b>replanejado</b>: células <span style="color:var(--ok)">verdes ✓</span> = metas cumpridas (na semana em que foram concluídas); demais células = questões que <b>faltam</b>, realocadas da semana atual em diante conforme a capacidade semanal de cada matéria. Colunas S7/S8 só aparecem quando o backlog estoura a S6.`
    :`Plano original fixo. Alterne para “Replanejado” para ver o cronograma ajustado à execução real.`} O tempo acima é só resolução; o restante do bloco de 15h/sem é teoria, lei seca, Anki e refazer erros.</div>`;
  return h;
}

// Assuntos PENDENTES de uma matéria replanejados para a semana (P1 → P2…, ✅2025 primeiro).
function topicosSemana(matGroup, week, plano){
  return Object.values(plano.info)
    .filter(i=>!i.ok&&grupo(i.t.mat)===matGroup&&i.semEff===week)
    .sort((a,b)=>prioSort(a.t,b.t));
}
// Conteúdo (HTML) de um bloco da grade para a semana corrente.
function blocoConteudo(matGroup, week, plano){
  if(matGroup==="CEX") return `<span class="bloco-note muted">Simulado/reforço misto — refazer os piores da semana (caderno de erros)</span>`;
  const tops=topicosSemana(matGroup, week, plano);
  if(tops.length){
    return tops.map(i=>`<span class="topchip${i.t.c25?' c25':''}">${i.t.c25?'✅ ':''}${escapeHtml(i.t.assunto)} <span class="qn">${i.qr>0?i.qr+"/":""}${i.meta}q</span>${i.movido?` <span class="mov-chip" title="movido da S${i.semOrig}">↪S${i.semOrig}</span>`:''}${codigosUI(i.t.id)}</span>`).join("");
  }
  // Sem pendências na semana: matérias rápidas (50 q/h) viram simulado.
  if(ritmo(matGroup)>=50) return `<span class="bloco-note">🎯 Sem pendências — simulado por bloco cronometrado (14 q) + refazer as erradas</span>`;
  return `<span class="bloco-note muted">Revisão / lei seca / Anki</span>`;
}

let cronoWeek=null; // null = segue a semana atual; nº = semana fixada pela navegação
function cronoNav(d){
  const base = cronoWeek || Math.min(8, Math.max(1, semanaDoDia(new Date())));
  cronoWeek = Math.min(8, Math.max(1, base + d));
  renderCronograma();
}
function cronoHoje(){ cronoWeek=null; renderCronograma(); }

function renderCronograma(){
  const plano=replanejar();
  const now=new Date();
  const cwReal=semanaDoDia(now);                          // semana real (pode ser <1 ou >8)
  const cw = cronoWeek || Math.min(8, Math.max(1, cwReal)); // semana exibida
  const isNow = (cronoWeek===null || cronoWeek===cwReal) && cwReal>=1 && cwReal<=8;
  const meta=SEMANAS[cw-1];

  let html=`<div class="card"><b>Período:</b> 25/06/2026 → 21/08/2026 · Segunda a sexta · 3h/dia direcionadas + ~45min de Anki à parte. Provas: 23/08 e 30/08.<br>
  <span class="muted">Em cada bloco ataque primeiro os tópicos <b>✅/P1</b> (caíram no TCE-PE 2025). Cont.Geral: 1 discursiva de DFC por semana (~25 linhas). Sáb: ~30-45min de Português; manutenção das demais via Anki diário.</span></div>`;

  // Resumo do replanejamento (execução real × plano)
  const infosP=Object.values(plano.info);
  const conclP=infosP.filter(i=>i.ok).length;
  const movP=infosP.filter(i=>!i.ok&&i.movido);
  const movQ=movP.reduce((a,i)=>a+i.resto,0);
  html+=`<div class="card" style="border-color:${movP.length?'var(--warn)':'var(--ok)'}">
    <b>🔄 Cronograma dinâmico:</b> ${conclP}/${infosP.length} assuntos com meta cumprida · ${movP.length
      ?`<span style="color:var(--warn)"><b>${movP.length} re-agendados</b> (${movQ}q pendentes movidas p/ frente${plano.overflow?`; <b>${plano.overflow}q estourando p/ S7–S8</b>`:""})</span>`
      :`<span style="color:var(--ok)">nenhum atraso — plano em dia</span>`}
    <span class="muted">· o que não é cumprido migra sozinho para as semanas seguintes — detalhe na aba <b>Gantt</b></span></div>`;

  // Avisos de fase fora do ciclo normal
  if(cwReal<1) html+=`<div class="card" style="border-color:var(--accent)"><b>🚀 Fase de arranque (25–26/jun)</b><br><span class="muted">Não monte a grade inteira. Só o de maior ROI + reative o Anki:<br>• 25/jun: DFin — Princípios Orçamentários (30q) · CG — Depreciação (15q)<br>• 26/jun: DFin — Classificação da Receita (30q) · CG — Depreciação (15q, fecha 30). Abaixo, já a grade da Semana 1.</span></div>`;
  if(cwReal>8) html+=`<div class="card" style="border-color:var(--ok)"><b>📝 Período de provas / entre provas</b><br><span class="muted">23/08 (1º dia) e 30/08 (2º dia). 24–28/ago: revisão dirigida ao bloco do 2º dia — só P1 + caderno de erros, sem conteúdo novo.</span></div>`;

  html += `<h2 class="sec">🎯 Metas de questões por semana <span class="pill">${cronoModo==="efetivo"?"ajustado à execução real":"plano original fixo"}</span></h2>
  <div class="filters">
    <button class="btn sm${cronoModo==='efetivo'?' primary':''}" onclick="cronoModoSet('efetivo')">🔄 Replanejado</button>
    <button class="btn sm${cronoModo==='original'?' primary':''}" onclick="cronoModoSet('original')">📋 Plano original</button>
  </div>
  <div class="card" style="overflow-x:auto">` + tabelaQuestoesSemana(cwReal>=1&&cwReal<=8?cwReal:0,plano) + `</div>`;

  // Navegador de semana
  html += `<div class="card crono-nav">
    <button class="btn" onclick="cronoNav(-1)" ${cw<=1?'disabled':''}>◀</button>
    <div><span class="wk">Semana ${meta.n}</span> ${isNow?'<span class="now-pill">semana atual</span>':''}<br><span class="ph">${meta.per} · ${escapeHtml(meta.fase)}</span></div>
    <button class="btn" onclick="cronoNav(1)" ${cw>=8?'disabled':''}>▶</button>
    ${cronoWeek!==null?'<button class="btn sm" onclick="cronoHoje()">↺ voltar p/ hoje</button>':''}
  </div>`;

  if(cw>=7){
    // Reta final: a grade dá lugar a simulados completos
    html += `<div class="card"><b>Reta final (S7–S8) — sem conteúdo novo</b>
      <div class="sched-item"><span class="min">~2h12</span><span class="mt">Simulado completo</span><span class="ds">1 simulado de 80 questões/dia + correção por matéria</span></div>
      <div class="sched-item"><span class="min">resto</span><span class="mt">Reforço cirúrgico</span><span class="ds">Só P1 das piores (DFin, Cont.Geral, DCon) + caderno de erros · releitura de 1 página-resumo/matéria</span></div>
      <div class="sched-item"><span class="min">Anki</span><span class="mt">Só revisão</span><span class="ds">Pare de introduzir cards novos a partir de 14/08</span></div>
    </div>`;
    // Backlog que o replanejamento empurrou p/ dentro da reta final
    const backlog=Object.values(plano.info).filter(i=>!i.ok&&i.semEff===cw).sort((a,b)=>prioSort(a.t,b.t));
    if(backlog.length){
      html+=`<div class="card" style="border-color:var(--warn)"><b>⚠ Backlog re-agendado para esta semana</b> <span class="muted">— liquidar antes/entre os simulados (${backlog.reduce((a,i)=>a+i.resto,0)}q)</span><br><div style="margin-top:8px">`+
        backlog.map(i=>`<span class="topchip${i.t.c25?' c25':''}">${i.t.c25?'✅ ':''}${escapeHtml(i.t.assunto)} <span class="qn">${i.qr>0?i.qr+"/":""}${i.meta}q</span> <span class="mov-chip">↪S${i.semOrig}</span>${codigosUI(i.t.id)}</span>`).join(" ")+`</div></div>`;
    }
  } else {
    const hojeDia = isNow ? DIA_SEMANA[now.getDay()] : null;
    Object.entries(GRADE).forEach(([dia,items])=>{
      const tot=items.reduce((a,i)=>a+i[0],0);
      const cls = dia===hojeDia ? " today" : "";
      html+=`<div class="sched-day${cls}"><h3><span>${dia} <span class="tot">${fmtMin(tot)} direcionadas</span></span></h3>`;
      items.forEach(([min,mat])=>{
        html+=`<div class="sched-item"><span class="min">${min}min</span><span class="mt"><span class="dot" style="background:${matCor(mat)}"></span> ${matNome(mat)}</span><span class="ds">${blocoConteudo(mat,cw,plano)}</span></div>`;
      });
      html+=`</div>`;
    });
  }

  html+=revSecaoCrono();

  html+=`<h2 class="sec">📈 Evolução ao longo das semanas</h2><div class="card">`;
  FASES.forEach(f=>{ html+=`<div class="phase"><h4>${f.sem} (${f.per}) — ${f.tit}</h4><p>${f.txt}</p></div>`; });
  html+=`<div class="phase" style="border-color:var(--ok)"><h4>Provas — 23/08 (1º dia) e 30/08 (2º dia)</h4><p>23/08: 1º dia. 24-28/ago: revisão dirigida ao bloco do 2º dia, sem conteúdo novo — só P1 + caderno de erros. 30/08: 2º dia.</p></div></div>`;
  document.getElementById("tab-cronograma").innerHTML=html;
}

/* ============================================================
   GANTT — previsto (plano original) × replanejado × realizado
   Linha do tempo diária de 25/06 a 21/08; um assunto por linha.
   ============================================================ */
const GANTT_DIAS=Math.round((new Date(PERIODO_FIM+"T12:00:00")-new Date(PERIODO_INI+"T12:00:00"))/86400000)+1;
function dayIdx(ds){
  const i=Math.round((new Date(ds+"T12:00:00")-new Date(PERIODO_INI+"T12:00:00"))/86400000);
  return Math.max(0,Math.min(GANTT_DIAS-1,i));
}
function gPos(d0,d1){ const a=dayIdx(d0), b=dayIdx(d1);
  return `left:${(a/GANTT_DIAS*100).toFixed(3)}%;width:${((b-a+1)/GANTT_DIAS*100).toFixed(3)}%`; }
function semDatas(w){ // [segunda, sexta] da semana w do ciclo
  const d=new Date(S1_SEGUNDA+"T12:00:00"); d.setDate(d.getDate()+(w-1)*7);
  const a=d.toISOString().slice(0,10); d.setDate(d.getDate()+4);
  return [a,d.toISOString().slice(0,10)];
}
let ganttFilt={mat:"",view:""}; // view: ""=todos | pend | mov | conc
function ganttSet(k,v){ ganttFilt[k]=v; renderGantt(); }
function renderGantt(){
  const plano=replanejar();
  const infos=Object.values(plano.info);
  const match=i=>{
    if(ganttFilt.mat&&grupo(i.t.mat)!==ganttFilt.mat) return false;
    if(ganttFilt.view==="pend") return !i.ok;
    if(ganttFilt.view==="mov") return !i.ok&&i.movido;
    if(ganttFilt.view==="conc") return i.ok;
    return true;
  };
  const mats=Object.keys(MAT_INFO).filter(g=>infos.some(i=>grupo(i.t.mat)===g));
  const concl=infos.filter(i=>i.ok).length, mov=infos.filter(i=>!i.ok&&i.movido).length;
  const hoje=todayStr();

  let html=`<div class="filters">
    <select onchange="ganttSet('mat',this.value)"><option value="">Todas as matérias</option>${mats.map(g=>`<option value="${g}" ${g===ganttFilt.mat?"selected":""}>${MAT_INFO[g].nome}</option>`).join("")}</select>
    <select onchange="ganttSet('view',this.value)">
      <option value="">Todos os assuntos</option>
      <option value="pend" ${ganttFilt.view==="pend"?"selected":""}>Só pendentes</option>
      <option value="mov" ${ganttFilt.view==="mov"?"selected":""}>Só re-agendados</option>
      <option value="conc" ${ganttFilt.view==="conc"?"selected":""}>Só concluídos</option>
    </select>
    <span class="qstat">${concl}/${infos.length} concluídos · ${mov} re-agendados${plano.overflow?` · ${plano.overflow}q estourando p/ S7–S8`:""}</span>
  </div>
  <div class="legend">
    <span><span style="width:18px;height:10px;border:1.5px dashed #8b9bb0;border-radius:3px;display:inline-block"></span> semana planejada (original)</span>
    <span><span style="width:18px;height:10px;background:#4cc2ff66;border-radius:3px;display:inline-block"></span> semana replanejada (pendente)</span>
    <span><span class="dot" style="background:var(--ok);border-radius:2px"></span> realizado — meta cumprida</span>
    <span><span class="dot" style="background:var(--warn);border-radius:2px"></span> realizado parcial</span>
    <span><span style="width:2px;height:12px;background:var(--bad);display:inline-block"></span> hoje</span>
  </div>
  <div class="card gantt-wrap"><div class="gantt">`;

  // overlay: separadores das semanas + linha de hoje (atravessam todas as linhas)
  let overlay="";
  for(let w=1;w<=8;w++){ const [a]=semDatas(w);
    overlay+=`<div class="g-sep" style="top:24px;bottom:0;left:calc(var(--glab) + (100% - var(--glab))*${(dayIdx(a)/GANTT_DIAS).toFixed(4)})"></div>`; }
  if(hoje>=PERIODO_INI&&hoje<=PERIODO_FIM)
    overlay+=`<div class="g-today" style="top:0;bottom:0;left:calc(var(--glab) + (100% - var(--glab))*${((dayIdx(hoje)+0.5)/GANTT_DIAS).toFixed(4)})" title="hoje"></div>`;

  // cabeçalho S1..S8
  html+=`<div class="g-row" style="min-height:24px"><div class="g-lab muted" style="font-size:11px">assunto · feitas/meta</div><div class="g-track">`;
  for(let w=1;w<=8;w++){ const [a,b]=semDatas(w);
    html+=`<div class="g-wlab" style="${gPos(a,b)};text-align:center" title="${fmtData(a)}–${fmtData(b)}">S${w}</div>`; }
  html+=`</div></div>`;

  let temLinha=false;
  mats.forEach(g=>{
    const items=infos.filter(i=>grupo(i.t.mat)===g&&match(i))
      .sort((a,b)=>a.semEff-b.semEff||prioSort(a.t,b.t));
    if(!items.length) return;
    temLinha=true;
    const doneG=infos.filter(i=>grupo(i.t.mat)===g&&i.ok).length, totG=infos.filter(i=>grupo(i.t.mat)===g).length;
    html+=`<div class="g-row ghead"><div class="g-lab"><span class="dot" style="background:${MAT_INFO[g].cor}"></span> <b>${MAT_INFO[g].nome}</b> <span class="q">${doneG}/${totG} concl.</span></div><div class="g-track"></div></div>`;
    items.forEach(i=>{
      const cor=MAT_INFO[g].cor;
      const st=i.ok
        ?`<span style="color:var(--ok)">${i.qr}/${i.meta}q ✓</span>`
        :`<span class="q">${i.qr}/${i.meta}q</span>${i.movido?` <span class="mov-chip">↪S${i.semOrig}→S${i.semEff}</span>`:""}`;
      html+=`<div class="g-row"><div class="g-lab" title="${escapeHtml(i.t.assunto)}"><span class="prio p${i.t.prio||3}" style="font-size:10px">${PRIO_LABEL[i.t.prio||3]}</span> ${i.t.c25?"✅ ":""}${escapeHtml(i.t.assunto)} ${st}</div><div class="g-track">`;
      const [p0,p1]=semDatas(Math.min(8,i.semOrig));
      html+=`<div class="g-bar g-plan" style="${gPos(p0,p1)}" title="planejado: S${i.semOrig} (${fmtData(p0)}–${fmtData(p1)})"></div>`;
      if(!i.ok){ const [e0,e1]=semDatas(i.semEff);
        html+=`<div class="g-bar g-eff" style="${gPos(e0,e1)};background:${cor}" title="replanejado: S${i.semEff} — faltam ${i.resto}q"></div>`; }
      const e=i.exec;
      if(e&&e.d0){
        const corR=i.ok?"var(--ok)":"var(--warn)";
        html+=`<div class="g-bar g-real" style="${gPos(e.d0,e.d1)};background:${corR}"></div>`;
        (e.dias||[]).forEach(ds=>html+=`<div class="g-dot" style="left:${(dayIdx(ds)/GANTT_DIAS*100).toFixed(3)}%;width:${(100/GANTT_DIAS).toFixed(3)}%;background:${corR}" title="sessão em ${fmtData(ds)}"></div>`);
      }
      html+=`</div></div>`;
    });
  });
  if(!temLinha) html+=`<div class="empty">Nenhum assunto com esses filtros.</div>`;
  html+=overlay+`</div></div>
  <div class="muted" style="font-size:12.5px;margin-top:10px">Somente assuntos com meta de questões no plano (os mantidos só via Anki ficam de fora). Barra tracejada = semana do plano original; barra colorida translúcida = para onde o pendente foi <b>replanejado</b> conforme a execução (o que não é feito anda para a frente, respeitando a capacidade semanal da matéria). Quadradinhos = dias com sessão registrada no assunto.</div>`;
  document.getElementById("tab-gantt").innerHTML=html;
}

function renderHistorico(){
  const all=sumBy(state.sessions);
  let html=`<div class="grid cards">
    <div class="card kpi"><div class="label">Total de sessões</div><div class="val">${state.sessions.length}</div></div>
    <div class="card kpi"><div class="label">Tempo acumulado</div><div class="val">${fmtMin(all.min)}</div></div>
    <div class="card kpi"><div class="label">Questões / acerto</div><div class="val">${all.qr} <small>· ${pct(all.qa,all.qr)}%</small></div></div>
  </div>
  <h2 class="sec">📜 Todas as sessões</h2><div class="card" id="histBox"></div>`;
  document.getElementById("tab-historico").innerHTML=html;
  drawHist();
}
function drawHist(){
  const ss=[...state.sessions].sort((a,b)=> (b.data+String(b.id)).localeCompare(a.data+String(a.id)));
  if(ss.length===0){ document.getElementById("histBox").innerHTML=`<div class="empty">Nenhuma sessão registrada ainda.</div>`; return; }
  let h=`<table><thead><tr><th>Data</th><th>Matéria</th><th>Assunto</th><th>Tempo</th><th class="right">Resolv.</th><th class="right">Acerto</th><th>Obs</th><th></th></tr></thead><tbody>`;
  ss.forEach(s=>{ const t=s.topicId?topicById(s.topicId):null; const ass=t?t.assunto:(s.assuntoLivre||"—");
    const ac=s.qResolvidas>0?pct(s.qAcertadas,s.qResolvidas)+"%":"—";
    h+=`<tr><td>${fmtData(s.data)}</td><td><span class="dot" style="background:${matCor(s.mat)}"></span> ${matNome(s.mat)}</td><td>${escapeHtml(ass)}</td><td>${fmtMin(s.minutos)}</td><td class="right">${s.qResolvidas||0}</td><td class="right">${ac}</td><td class="muted">${escapeHtml(s.obs||"")}</td><td><button class="btn sm danger" onclick="delHist(${s.id})">×</button></td></tr>`; });
  document.getElementById("histBox").innerHTML=h+`</tbody></table>`;
}
function delHist(id){ if(!confirm("Excluir esta sessão?"))return; state.sessions=state.sessions.filter(s=>s.id!==id); save(); drawHist(); toast("Excluída"); }

/* ============================================================
   SYNC ENTRE COMPUTADORES (GitHub Gist secreto)
   O estado inteiro vive num arquivo JSON dentro de um Gist. Cada máquina
   guarda token+id só no próprio localStorage (fora do estado — não entram
   no backup nem no Gist). Conflito: o estado mais recente (updatedAt) vence,
   então evite usar dois computadores com a aba aberta ao mesmo tempo.
   ============================================================ */
const SYNC_LS={token:"estudosTCEPE_syncToken",gist:"estudosTCEPE_syncGist"};
const SYNC_FILE="estudos-tcepe.json";
let syncTimer=null, syncEstado="off"; // off | ok | pendente | sincronizando | erro

function syncCfg(){ return {token:localStorage.getItem(SYNC_LS.token)||"", gist:localStorage.getItem(SYNC_LS.gist)||""}; }
function syncSetStatus(s,msg){
  syncEstado=s; const el=document.getElementById("syncStatus"); if(!el) return;
  const map={off:"",ok:"☁ sincronizado",pendente:"☁ alterações pendentes…",sincronizando:"☁ sincronizando…",erro:"☁ ⚠ "+(msg||"erro")};
  el.textContent=map[s]||""; el.style.color = s==="erro" ? "var(--bad)" : "";
}
async function syncApi(method,path,body,token){
  const r=await fetch("https://api.github.com"+path,{method,
    headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json"},
    body:body?JSON.stringify(body):undefined});
  if(!r.ok) throw new Error("GitHub "+r.status);
  return r.json();
}
function syncTemDados(s){ return !!(s && ((s.sessions&&s.sessions.length) || Object.keys(s.revFeitas||{}).length)); }
async function syncPush(){
  const c=syncCfg(); if(!c.token||!c.gist) return;
  if(!state.updatedAt){ state.updatedAt=new Date().toISOString(); localStorage.setItem(LS_KEY,JSON.stringify(state)); }
  syncSetStatus("sincronizando");
  try{
    await syncApi("PATCH","/gists/"+c.gist,{files:{[SYNC_FILE]:{content:JSON.stringify(state)}}},c.token);
    syncSetStatus("ok");
  }catch(e){ syncSetStatus("erro","falha ao enviar — clique em ☁ Sync"); }
}
function syncAgendar(){ // chamada em todo save(); agrupa gravações em 1 envio
  const c=syncCfg(); if(!c.token||!c.gist) return;
  syncSetStatus("pendente"); clearTimeout(syncTimer); syncTimer=setTimeout(syncPush,2500);
}
async function syncPull(){
  const c=syncCfg(); if(!c.token||!c.gist) return;
  syncSetStatus("sincronizando");
  try{
    const g=await syncApi("GET","/gists/"+c.gist,null,c.token);
    const f=g.files&&g.files[SYNC_FILE];
    if(f){
      let remoto=null;
      try{ remoto=JSON.parse(f.truncated ? await (await fetch(f.raw_url)).text() : f.content); }catch(_){}
      if(remoto&&remoto.sessions){
        const rU=remoto.updatedAt||"", lU=state.updatedAt||"";
        // Proteções: estado vazio nunca sobrescreve dados reais, em nenhuma direção.
        if(syncTemDados(state)&&!syncTemDados(remoto)) return syncPush();
        const adotarRemoto = (syncTemDados(remoto)&&!syncTemDados(state)) || rU>lU;
        if(adotarRemoto){
          state=Object.assign(defaultState(),remoto);
          localStorage.setItem(LS_KEY,JSON.stringify(state));
          const ab=document.querySelector("#tabs button.active"); render(ab?ab.dataset.tab:"dash");
          toast("Dados atualizados do outro computador ☁");
        } else if(lU>rU){ return syncPush(); } // local é mais novo → envia
      }
    }
    syncSetStatus("ok");
  }catch(e){ syncSetStatus("erro","falha ao buscar"); }
}
async function syncSetup(){
  const c=syncCfg();
  const token=(prompt("Token CLÁSSICO do GitHub com escopo 'gist' (Settings → Developer settings → Tokens classic).\nFica salvo só neste navegador.",c.token)||"").trim();
  if(!token){
    if(c.token&&confirm("Desativar a sincronização nesta máquina?")){
      localStorage.removeItem(SYNC_LS.token); localStorage.removeItem(SYNC_LS.gist); syncSetStatus("off");
    }
    return;
  }
  let gist=(prompt("ID do Gist (deixe vazio para CRIAR um Gist secreto novo agora):",c.gist)||"").trim();
  try{
    if(!gist){
      const g=await syncApi("POST","/gists",{description:"Estudos TCE-PE — estado do dashboard",public:false,
        files:{[SYNC_FILE]:{content:JSON.stringify(state)}}},token);
      gist=g.id;
      alert("Gist secreto criado!\n\nID (use-o ao configurar o outro computador):\n"+gist);
    } else {
      await syncApi("GET","/gists/"+gist,null,token); // valida token+id
    }
    localStorage.setItem(SYNC_LS.token,token); localStorage.setItem(SYNC_LS.gist,gist);
    toast("Sync configurada ✓"); syncPull();
  }catch(e){ alert("Não deu certo ("+e.message+").\nConfira se o token tem o escopo Gists e se o ID está correto."); }
}
syncPull(); // ao abrir: busca o estado mais recente
window.addEventListener("beforeunload",()=>{ // fechar a aba com envio pendente → tenta mandar mesmo assim
  if(syncEstado!=="pendente") return;
  const c=syncCfg(); if(!c.token||!c.gist) return;
  fetch("https://api.github.com/gists/"+c.gist,{method:"PATCH",keepalive:true,
    headers:{Authorization:"Bearer "+c.token,Accept:"application/vnd.github+json"},
    body:JSON.stringify({files:{[SYNC_FILE]:{content:JSON.stringify(state)}}})});
});

/* ============================================================
   BACKUP / RESTORE
   ============================================================ */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="estudos-tcepe-backup-"+todayStr()+".json"; a.click(); toast("Backup gerado");
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ const s=JSON.parse(r.result);
    if(!s.sessions||!s.topicStatus) throw 0;
    state=Object.assign(defaultState(),s); save();
    document.querySelector("#tabs button.active")?.click() || render("dash"); render("dash");
    toast("Backup restaurado");
  }catch(e){ alert("Arquivo inválido."); } ev.target.value=""; };
  r.readAsText(f);
}

render("dash");

  .then(r=>r.ok?r.json():null)
  .then(j=>{ if(!j||!j.cadeias) return; REV_ESTADO=j;
    const ab=document.querySelector("#tabs button.active"); render(ab?ab.dataset.tab:"dash"); })
  .catch(()=>{});
